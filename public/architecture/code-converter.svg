<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#1D1D1D"/>
  <text x="400" y="40" text-anchor="middle" fill="#E3405F" font-family="sans-serif" font-size="18" font-weight="bold">Code Converter — Architecture</text>
  <!-- Upload -->
  <rect x="40" y="100" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="120" y="135" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">File Upload</text>
  <!-- Parser -->
  <rect x="280" y="100" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="360" y="135" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">AST Parser</text>
  <!-- LLM -->
  <rect x="520" y="100" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="600" y="135" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">LLM Conversion</text>
  <!-- Output -->
  <rect x="280" y="240" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="360" y="270" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">Diff View</text>
  <!-- Export -->
  <rect x="520" y="240" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="600" y="270" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">ZIP Export</text>
  <!-- Arrows -->
  <line x1="200" y1="130" x2="280" y2="130" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="130" x2="520" y2="130" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="160" x2="600" y2="240" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="270" x2="440" y2="270" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="370" text-anchor="middle" fill="#6E6E73" font-family="sans-serif" font-size="11">Placeholder — replace with detailed diagram</text>
  <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#8D8D8D"/></marker></defs>
</svg>
