<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#1D1D1D"/>
  <text x="400" y="40" text-anchor="middle" fill="#E3405F" font-family="sans-serif" font-size="18" font-weight="bold">Arythm — Architecture</text>
  <!-- Player UI -->
  <rect x="40" y="120" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="120" y="155" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">React Player UI</text>
  <!-- State -->
  <rect x="280" y="120" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="360" y="155" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">Audio State</text>
  <!-- API Proxy -->
  <rect x="520" y="120" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
