  <!-- YouTube -->
  <rect x="520" y="260" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="600" y="295" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">YouTube Data API</text>
  <!-- Lyrics -->
  <rect x="280" y="260" width="160" height="60" rx="8" fill="#292A2D" stroke="#E3405F" stroke-width="1.5"/>
  <text x="360" y="295" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">Lyrics Sync</text>
  <!-- Arrows -->
  <line x1="200" y1="150" x2="280" y2="150" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="440" y1="150" x2="520" y2="150" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="600" y1="180" x2="600" y2="260" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="360" y1="180" x2="360" y2="260" stroke="#8D8D8D" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="400" y="370" text-anchor="middle" fill="#6E6E73" font-family="sans-serif" font-size="11">Placeholder — replace with detailed diagram</text>
